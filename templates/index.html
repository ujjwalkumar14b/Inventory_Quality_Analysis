<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Quality Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Inventory Quality Analyzer</h2>

        <form method="POST" enctype="multipart/form-data" class="text-center">
            <input class="form-control mb-3" type="file" name="file" required>
            <button class="btn btn-primary" type="submit">Upload & Predict</button>
        </form>

        {% if img_path %}
        <div class="text-center mt-4">
            <h5>Uploaded Image:</h5>
            <img src="/{{ img_path }}" class="img-fluid rounded" style="max-height:300px;">
        </div>
        {% endif %}

        {% if result %}
        <div class="alert alert-info text-center mt-4">
            <h4>Prediction: {{ result }}</h4>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
